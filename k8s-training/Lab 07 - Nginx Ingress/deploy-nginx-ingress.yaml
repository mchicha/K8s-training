apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-http-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: default-http-backend
  template:
    metadata:
      labels:
        app: default-http-backend
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: default-http-backend
        # Any image is permissable as long as:
        # 1. It serves a 404 page at /
        # 2. It serves 200 on a /healthz endpoint
        image: k8s.gcr.io/defaultbackend-amd64:1.5
        env:
        - name: GOMAXPROCS
          value: "1"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          timeoutSeconds: 5
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 10m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
    name: default-http-backend
spec:
    selector:
      app: default-http-backend
    ports:
      - protocol: TCP
        port: 80
        targetPort: 8080
    type: NodePort            
