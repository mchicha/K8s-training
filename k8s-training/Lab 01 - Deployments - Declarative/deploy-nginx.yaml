apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: israel
  labels:
    app: nginx
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        version: "1.17"
    spec:
      containers:
        - name: nginx
          image: nginx:1.17
          ports:
          - containerPort: 80