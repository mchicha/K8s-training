apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy # Name of the deployment
  namespace: israel # Namespace where the deployment will be created
  labels:
    app: nginx # Deployment label
spec:
  replicas: 5
  selector:
    matchLabels: # Labels of the replica selector
      app: nginx
  template:
    metadata:
      name: nginx-replica # Name of the replicas
      labels:
        app: nginx # name of the repplicas
        version: "1.17" # Version label for the deployment
    spec:
      containers:
        - name: nginx-pod # The name of the pod
          image: nginx:1.17 # The image which will we deploy
          ports: 
            - containerPort: 80 # The port which will be open in the container
